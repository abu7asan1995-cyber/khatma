<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الختمة رقم (1)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; text-align: center; padding: 15px; direction: rtl; }
        .container { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .header { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        .progress-text { font-family: 'Courier New', monospace; font-size: 1.1rem; margin: 15px 0; display: block; letter-spacing: 2px; color: #27ae60; }
        .divider { border-bottom: 2px solid #eee; margin: 20px 0; }
        .user-card { background: #fafafa; border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; position: relative; }
        .user-card:hover { border-color: #3498db; }
        .user-card.completed { background: #effaf3; border-color: #27ae60; }
        .user-card.locked { opacity: 0.7; cursor: not-allowed; }
        .name { font-size: 1.05rem; font-weight: bold; }
        .status-icon { float: left; font-size: 1.2rem; }
        .word-info { color: #7f8c8d; margin-top: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">📖 الـخِـتـمَـةُ رَقـم (1) 📖</div>
    <div style="color: #34495e; font-weight: bold;">📊 نِـسـبـةُ الإِنـجـازِ الـعـامَّـة:</div>
    <div id="progress-container" class="progress-text">[░░░░░░░░░░░░░░░░░░░░] 0%</div>
    <div style="font-size: 0.85rem; color: #95a5a6;">📅 المدة: من السبت (28 / 03) إلى الجمعة (03 / 04)</div>
    
    <div class="divider"></div>
    <div id="users-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWEURJFC2xJC9afCfIpNUno4XahVb8HAM",
        authDomain: "khatma-85d12.firebaseapp.com",
        databaseURL: "https://khatma-85d12-default-rtdb.firebaseio.com",
        projectId: "khatma-85d12",
        storageBucket: "khatma-85d12.firebasestorage.app",
        messagingSenderId: "801962624693",
        appId: "1:801962624693:web:764883064453e6e1e3a0fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const users = [
        { n: "محمد صالح الكعود", c: "🔴" }, { n: "ايمن المضحي", c: "🟠" }, { n: "شاهين بكور", c: "🟡" },
        { n: "زين بشير", c: "🟢" }, { n: "علي عثمان", c: "🔵" }, { n: "علي بشير", c: "🟣" },
        { n: "قصي الكعود", c: "⚪" }, { n: "محمد الزعو", c: "⚫" }, { n: "بنيان مخيليل", c: "🔴" },
        { n: "أيمن الصحوبي", c: "🟠" }, { n: "مدلول حصيني", c: "🟡" }, { n: "عبود الملا", c: "🟢" },
        { n: "محمود", c: "🔵" }, { n: "جمعة", c: "🟣" }, { n: "فادي مخيليل", c: "⚪" },
        { n: "عدنان عثمان", c: "⚫" }, { n: "حسين مخيليل", c: "🔴" }, { n: "رضوان السالم", c: "🟠" },
        { n: "عامر المذري", c: "🟡" }, { n: "العكيد", c: "🟢" }, { n: "ابراهيم صالح كعود", c: "🔵" },
        { n: "نزهان الكعود", c: "🟣" }, { n: "حيدر المضحي", c: "⚪" }, { n: "حيدر الثلاج", c: "⚫" },
        { n: "علي حسن الكعود", c: "🔴" }, { n: "صطيف ابو حسين", c: "🟠" }, { n: "حسن الحاج علي", c: "🟡" },
        { n: "حمودي عايد الكعود", c: "🟢" }, { n: "حسن مخيليل", c: "🔵" }, { n: "حمودي الملا", c: "👑", sp: true }
    ];

    const listDiv = document.getElementById('users-list');
    let mySelectedPart = localStorage.getItem('myKhatmaPart'); // تذكر الجزء المختار لهذا المتصفح

    users.forEach((u, i) => {
        const id = i + 1;
        const card = document.createElement('div');
        card.className = 'user-card';
        card.id = `u-${id}`;
        card.onclick = () => handleAction(id, u.n);
        
        let nameTxt = u.sp ? `👑 ⚜️〔 ${u.n} 〕⚜️` : `${u.c} ❪ ${u.n} ❫`;
        card.innerHTML = `<span class="status-icon" id="i-${id}">⏳</span><div class="name">${nameTxt}</div><div class="word-info">📖 الورد: 【 ${id < 10 ? '0' + id : id} 】</div>`;
        listDiv.appendChild(card);
    });

    async function handleAction(id, name) {
        // إذا كان الشخص قد اختار جزءاً سابقاً ويحاول الضغط على غيره
        if (mySelectedPart && mySelectedPart != id) {
            alert("⚠️ عذراً، لقد قمت باختيار جزء آخر بالفعل. يمكنك تعديل جزئك الخاص فقط!");
            return;
        }

        const statusRef = ref(db, 'khatma_v2/u' + id);
        const snap = await get(statusRef);
        const isDone = snap.val() || false;

        if (!isDone) {
            if (confirm(`هل أنت متأكد من إنهاء الورد الخاص بـ (${name})؟`)) {
                set(statusRef, true);
                localStorage.setItem('myKhatmaPart', id); // حفظ الاختيار
                mySelectedPart = id;
            }
        } else {
            // السماح بإلغاء التحديد فقط إذا كان هو صاحب التحديد
            if (mySelectedPart == id) {
                if (confirm("هل تريد التراجع عن علامة الإتمام؟")) {
                    set(statusRef, false);
                    localStorage.removeItem('myKhatmaPart'); // مسح الحفظ
                    mySelectedPart = null;
                }
            } else {
                alert("❌ لا يمكنك إلغاء إتمام جزء قام به شخص آخر!");
            }
        }
    }

    onValue(ref(db, 'khatma_v2'), (snap) => {
        const data = snap.val() || {};
        let done = 0;
        for(let i=1; i<=30; i++) {
            const card = document.getElementById(`u-${i}`);
            const icon = document.getElementById(`i-${i}`);
            if(data['u'+i]) {
                card.classList.add('completed');
                icon.innerText = "✅";
                done++;
            } else {
                card.classList.remove('completed');
                icon.innerText = "⏳";
            }
        }
        const p = Math.round((done/30)*100);
        const b = Math.round(p/5);
        document.getElementById('progress-container').innerText = `[${"█".repeat(b)}${"░".repeat(20-b)}] ${p}%`;
    });
</script>
</body>
</html>
