<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل حضور الطلاب - معهد النفط والغاز</title>
    <style>
        :root { --oil-black: #1a1a1a; --oil-gold: #f39c12; --success: #27ae60; --bg: #eef2f3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .dashboard { max-width: 600px; margin: auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--oil-gold); }
        .header { background: var(--oil-black); color: white; padding: 20px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; }
        .stats-bar { display: flex; justify-content: space-around; background: #f9f9f9; padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold; }
        .student-list { padding: 15px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .student-row:hover { border-color: var(--oil-gold); background: #fffdf9; }
        .student-row.present { border-color: var(--success); background: #f0fff4; }
        .info { display: flex; flex-direction: column; }
        .name { font-weight: bold; font-size: 1.05rem; }
        .time { font-size: 0.8rem; color: #7f8c8d; margin-top: 3px; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: #eee; }
        .present .status-badge { background: var(--success); color: white; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>🛢️ نظام تسجيل الحضور اليومي</h2>
        <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.8;">معهد النفط والغاز - قسم التدريب</div>
    </div>
    
    <div class="stats-bar">
        <span>العدد الكلي: 10</span>
        <span style="color: var(--success);">الحاضرون: <span id="present-count">0</span></span>
    </div>

    <div class="student-list" id="list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // بيانات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDWEURJFC2xJC9afCfIpNUno4XahVb8HAM",
        authDomain: "khatma-85d12.firebaseapp.com",
        databaseURL: "https://khatma-85d12-default-rtdb.firebaseio.com",
        projectId: "khatma-85d12",
        appId: "1:801962624693:web:764883064453e6e1e3a0fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const students = [
        "أحمد الجاسم", "عمر الفياض", "خالد العلي", "ياسين العبود", "فهد السالم",
        "مؤيد الحسين", "سلطان المحمد", "بشار الناصر", "منصور الخليف", "ليث الإبراهيم"
    ];

    const listDiv = document.getElementById('list');
    let myId = localStorage.getItem('attendance_id');

    students.forEach((name, i) => {
        const id = i + 1;
        const row = document.createElement('div');
        row.className = 'student-row';
        row.id = `std-${id}`;
        row.onclick = () => recordAttendance(id, name);
        row.innerHTML = `
            <div class="info">
                <span class="name">${id}. ${name}</span>
                <span class="time" id="time-${id}">لم يسجل حضور</span>
            </div>
            <span class="status-badge" id="badge-${id}">غائب</span>
        `;
        listDiv.appendChild(row);
    });

    async function recordAttendance(id, name) {
        if (myId && myId != id) {
            alert("⚠️ لا يمكنك تسجيل الحضور لزميل آخر!");
            return;
        }

        const dbRef = ref(db, 'attendance/std' + id);
        const snap = await get(dbRef);
        
        if (!snap.val()) {
            if (confirm(`تأكيد تسجيل حضور الطالب: ${name}؟`)) {
                const now = new Date();
                const timeStr = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
                set(dbRef, { present: true, time: timeStr });
                localStorage.setItem('attendance_id', id);
                myId = id;
            }
        }
    }

    onValue(ref(db, 'attendance'), (snap) => {
        const data = snap.val() || {};
        let count = 0;
        students.forEach((_, i) => {
            const id = i + 1;
            const record = data['std' + id];
            const row = document.getElementById(`std-${id}`);
            const badge = document.getElementById(`badge-${id}`);
            const timeSpan = document.getElementById(`time-${id}`);

            if (record && record.present) {
                row.classList.add('present');
                badge.innerText = "حاضر";
                timeSpan.innerText = "وقت الدخول: " + record.time;
                count++;
            }
        });
        document.getElementById('present-count').innerText = count;
    });
</script>
</body>
</html>
